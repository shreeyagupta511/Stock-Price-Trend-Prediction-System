<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Stock | StockTrend</title>
   <link rel="stylesheet" href="{{ url_for('static', filename='input.css') }}">
</head>

<body>

<!-- Navigation Bar -->
<div class="navbar">
    <h2>StockTrend</h2>
</div>

<!-- Main Content -->
<div class="card">

<h2>Upload Stock Data</h2>

<p>Enter an NSE stock symbol to fetch live market data and predict future trends.</p>

<form action="/upload" method="POST">

    <label for="market"><strong>Select Market</strong></label>

<br><br>

<select id="market" name="market" class="dropdown">

    <option value="india">🇮🇳 India (NSE/BSE)</option>

    <option value="usa">🇺🇸 USA (NASDAQ/NYSE)</option>

    <option value="global">🌍 Global</option>

</select>

<br><br>

    <label for="companySearch"><strong>Search Company</strong></label>

<div class="search-container">

    <input
        type="text"
        id="companySearch"
        placeholder="Search company..."
        autocomplete="off"
        required>

    <input
        type="hidden"
        id="symbol"
        name="symbol">

    <div id="suggestions"></div>

</div>
    <br><br>

    <button type="submit" class="btn">

        Predict Trend

    </button>

</form>

</div>

<!-- Footer -->
<footer>
    © 2026 | Real-Time Stock Market Analysis & Prediction
</footer>

<script src="{{ url_for('static', filename='search.js') }}"></script>

</body>
</html>
