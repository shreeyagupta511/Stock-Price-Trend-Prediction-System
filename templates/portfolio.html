<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet"
      href="{{ url_for('static', filename='result.css') }}">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Recommendation</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{

            min-height:100vh;
            margin:0;
            padding:0;
            background-image: url("{{ url_for('static', filename='background3.jpg') }}");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            background-attachment:fixed;
            

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{

            width:90%;
            max-width:1200px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(10px);
            border-radius:20px;
            padding:40px;
            box-shadow:0 8px 32px rgba(0,0,0,0.3);
            color:black;
        }
        

        h1{

            text-align:center;

            margin-bottom:20px;

            font-size:42px;

            color:whitesmoke;
        }

        .investment-box{

            text-align:center;

            margin-bottom:30px;

            font-size:24px;

            font-weight:bold;
        }

        table{

            width:100%;

            border-collapse:collapse;

            overflow:hidden;

            border-radius:12px;
        }

        th{

            background:#1a237e;

            color:white;

            padding:15px;

            font-size:20px;
        }

        td{

            text-align:center;

            padding:15px;

            background:rgba(255,255,255,0.85);

            color:black;

            font-size:18px;
        }

        tr:hover td{

            background:#dbe9ff;
        }

        .positive{

            color:green;

            font-weight:bold;
        }

        .buttons{

            text-align:center;

            margin-top:35px;
        }

        .btn{

            text-decoration:none;
        }

        .btn button{

            background:#28a745;

            color:white;

            border:none;

            padding:12px 25px;

            margin:10px;

            border-radius:8px;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;
        }

        .btn button:hover{

            transform:scale(1.05);

            background:#218838;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
    <h2>StockTrend</h2>
    </div>

    <div class="container">

        <h1>📊 Portfolio Recommendation</h1>

        <div class="investment-box">

            Total Investment Amount : ₹{{ investment }}

        </div>

        <table>

            <tr>

                <th>Stock</th>

                <th>Expected Return (%)</th>

                <th>Recommended Investment (₹)</th>

            </tr>

            {% for stock in stocks %}

            <tr>

                <td>{{ stock.stock }}</td>

                <td class="positive">
                    {{ stock.profit|round(2) }}
                </td>

                <td>
                    ₹{{ stock.allocation }}
                </td>

            </tr>

            {% endfor %}

        </table>

        <div class="buttons">

            <a href="/topstocks" class="btn">
                <button>
                    Top Stocks
                </button>
            </a>

            <a href="/" class="btn">
                <button>
                    Analyze Another Stock
                </button>
            </a>

        </div>

    </div>


</body>

</html>
