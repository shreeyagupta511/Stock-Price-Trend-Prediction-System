<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Portfolio Recommendation</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

            min-height:100vh;

            background-image:url("{{ url_for('static', filename='background3.jpg') }}");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            background-attachment:fixed;

        }

        /* NAVBAR */

        .navbar{

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:20px 60px;

            background:rgba(0,0,0,0.6);

        }

        .logo{

            color:white;
            font-size:28px;
            font-weight:bold;

        }

        .nav-links{

            list-style:none;
            display:flex;
            gap:30px;

        }

        .nav-links a{

            text-decoration:none;
            color:white;
            font-size:18px;

        }

        .nav-links a:hover{

            color:#00d4ff;

        }

        /* FORM CARD */

        .container{

            display:flex;
            justify-content:center;
            align-items:center;

            height:80vh;

        }

        .card{

            width:500px;

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(10px);

            padding:40px;

            border-radius:20px;

            box-shadow:0 8px 32px rgba(0,0,0,0.3);

            text-align:center;

            color:white;

        }

        .card h1{

            margin-bottom:25px;

            font-size:36px;

        }

        .card p{

            margin-bottom:20px;

            font-size:18px;

        }

        input{

            width:100%;

            padding:15px;

            border:none;

            border-radius:10px;

            font-size:18px;

            margin-bottom:25px;
        }

        .btn{

            width:100%;

            padding:15px;

            border:none;

            border-radius:10px;

            background:#1a237e;

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;
        }

        .btn:hover{

            background:#283593;

            transform:scale(1.03);

        }

        .back-btn{

            margin-top:15px;

            background:#28a745;
        }

        .back-btn:hover{

            background:#218838;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>StockTrend</h2>
    </div>

    <nav class="navbar">

        <div class="logo">
            📈 StockTrend
        </div>

        <ul class="nav-links">

            <li><a href="/">Home</a></li>

            <li><a href="/topstocks">Top Stocks</a></li>

        </ul>

    </nav>

    <div class="container">

        <div class="card">

            <h1>Portfolio Recommendation</h1>

            <p>
                Enter the amount you want to invest and get an optimized stock portfolio.
            </p>

            <form action="/portfolio" method="POST">

                <input
                    type="number"
                    name="investment"
                    placeholder="Enter Investment Amount (₹)"
                    required
                >

                <button type="submit" class="btn">
                    Generate Portfolio
                </button>

            </form>

            <a href="/" style="text-decoration:none;">

                <button class="btn back-btn">
                    Analyze Another Stock
                </button>

            </a>

        </div>

    </div>


</body>

</html>
